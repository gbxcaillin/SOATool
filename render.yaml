services:
  - type: web
    name: soa-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --worker-class gevent --timeout 300 --keep-alive 5
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: USERS
        sync: false
